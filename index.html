<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amadon P2P Calc</title>
<style>
/* ── Variables · Light ─────────────────────── */
:root,
[data-theme="light"]{
  --bg:            #fbf5ea;
  --surface:       #f5ecdc;
  --card-bg:       #fdf8f0;
  --border:        #ddd0bb;
  --border-soft:   #ebe1d0;
  --text:          #3a2c1d;
  --muted:         #8b7355;
  --accent:        #6b4423;
  --accent-soft:   #b08a64;
  --amadon-card:   #efe2cc;
  --market-card:   #e6d4b8;
  --bep-bg:        #f3ead8;
  --input-bg:      #fffdf8;
  --head-bg:       #f7eedf;
  --btn-bg:        #fffdf8;
  --btn-hover:     #f0e3d1;
  --acc-bg:        #f5ede2;
  --acc-hover:     #ecdcc6;
  --shadow-sm:     0 1px 2px rgba(60,40,20,.05);
  --shadow-md:     0 4px 20px rgba(60,40,20,.08);
  --shadow-lg:     0 10px 36px rgba(60,40,20,.10);
  --ring:          rgba(107,68,35,.35);
  --rec-fg:        #fdf8f0;
  --toast-fg:      #fdf8f0;
  --rec-mk-bg:     #4a6741;
  --rec-am-bg:     #6b4c3b;
  --rec-tie-bg:    #5c4a3a;
  --menu-bg:       #fffdf8;
  --opt-hover:     #f0e3d1;
  --opt-sel-bg:    #f5ede2;
  --invalid-bg:    rgba(201,76,76,.06);
  --invalid-bd:    #c94c4c;
}

/* ── Variables · Dark ──────────────────────── */
[data-theme="dark"]{
  --bg:            #15110c;
  --surface:       #1d160e;
  --card-bg:       #1f1810;
  --border:        #3a2c1d;
  --border-soft:   #2a2018;
  --text:          #ece0cc;
  --muted:         #9d8367;
  --accent:        #d6a878;
  --accent-soft:   #a07a55;
  --amadon-card:   #241a10;
  --market-card:   #20180f;
  --bep-bg:        #1c150d;
  --input-bg:      #16110a;
  --head-bg:       #1c150d;
  --btn-bg:        #1a140c;
  --btn-hover:     #2a2018;
  --acc-bg:        #1f1810;
  --acc-hover:     #2a2018;
  --shadow-sm:     0 1px 2px rgba(0,0,0,.3);
  --shadow-md:     0 4px 20px rgba(0,0,0,.4);
  --shadow-lg:     0 10px 36px rgba(0,0,0,.5);
  --ring:          rgba(214,168,120,.45);
  --rec-fg:        #fdf8f0;
  --toast-fg:      #1a1208;
  --rec-mk-bg:     #3f6238;
  --rec-am-bg:     #7a5640;
  --rec-tie-bg:    #4a3a2d;
  --menu-bg:       #1f1810;
  --opt-hover:     #2a2018;
  --opt-sel-bg:    #2a2018;
  --invalid-bg:    rgba(224,101,101,.08);
  --invalid-bd:    #e06565;
}

/* ── Reset ──────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,-apple-system,'Noto Sans JP','Noto Sans KR','Noto Sans SC',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:1.5rem 1rem;
  line-height:1.5;
  transition:background-color .3s ease,color .3s ease;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ── Container ──────────────────────────────── */
.wrap{
  max-width:920px;
  margin:0 auto;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:var(--shadow-lg);
  overflow:visible;
  transition:background-color .3s ease,border-color .3s ease,box-shadow .3s ease;
}

/* ── Header ─────────────────────────────────── */
.hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:.72rem 1.05rem;
  background:var(--head-bg);
  border-bottom:1px solid var(--border);
  border-radius:14px 14px 0 0;
  gap:.6rem;
  transition:background-color .3s ease,border-color .3s ease;
}
.hdr-l{display:flex;align-items:center;gap:.6rem}
.hdr-t{line-height:1.2}
.hdr-title{font-size:.96rem;font-weight:700;color:var(--accent);transition:color .3s ease}
.hdr-sub{font-size:.69rem;color:var(--muted);font-weight:500;transition:color .3s ease;margin-top:.08rem}
.hdr-r{display:flex;align-items:center;gap:.45rem}

/* ── Logo badge ─────────────────────────────── */
.logo-badge{
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  background:var(--acc-bg);
  border:1px solid var(--border);
  border-radius:9px;
  flex-shrink:0;
  transition:background-color .3s ease,border-color .3s ease;
}
.hdr-logo{
  stroke:var(--accent);
  fill:none;
  transition:stroke .3s ease;
}

/* ── Theme toggle ───────────────────────────── */
.theme-toggle{
  position:relative;
  width:32px;height:32px;
  display:inline-flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:8px;
  background:var(--btn-bg);cursor:pointer;
  color:var(--accent);
  transition:background .15s,border-color .15s,color .15s,transform .15s;
}
.theme-toggle:hover{background:var(--btn-hover);border-color:var(--accent);transform:translateY(-1px)}
.theme-toggle:active{transform:translateY(0)}
.theme-toggle:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
.theme-toggle svg{width:16px;height:16px;stroke:currentColor;position:absolute;transition:opacity .25s ease,transform .35s cubic-bezier(.4,0,.2,1)}
.theme-toggle .ic-sun{opacity:0;transform:rotate(-90deg) scale(.6)}
.theme-toggle .ic-moon{opacity:1;transform:rotate(0) scale(1)}
[data-theme="dark"] .theme-toggle .ic-sun{opacity:1;transform:rotate(0) scale(1)}
[data-theme="dark"] .theme-toggle .ic-moon{opacity:0;transform:rotate(90deg) scale(.6)}

/* ── Language dropdown ──────────────────────── */
.lang-dd{position:relative}
.lang-btn{
  display:inline-flex;align-items:center;gap:.38rem;
  font-family:inherit;font-size:.66rem;font-weight:600;
  padding:.36rem .55rem .36rem .5rem;
  border:1px solid var(--border);border-radius:7px;
  background:var(--btn-bg);color:var(--text);
  cursor:pointer;
  transition:background .15s,border-color .15s,color .15s;
}
.lang-btn:hover{background:var(--btn-hover);border-color:var(--accent)}
.lang-btn:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
.lang-flag{font-size:.78rem;line-height:1}
.lang-code{letter-spacing:.03em}
.lang-caret{
  width:10px;height:10px;
  stroke:var(--muted);
  transition:transform .2s ease,stroke .2s;
}
.lang-dd.open .lang-caret{transform:rotate(180deg);stroke:var(--accent)}

.lang-menu{
  position:absolute;
  top:calc(100% + 6px);
  right:0;
  min-width:188px;
  background:var(--menu-bg);
  border:1px solid var(--border);
  border-radius:9px;
  box-shadow:var(--shadow-md);
  padding:.32rem;
  z-index:50;
  opacity:0;
  transform:translateY(-4px);
  pointer-events:none;
  transition:opacity .15s ease,transform .15s ease;
}
.lang-dd.open .lang-menu{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}
.lang-opt{
  display:flex;align-items:center;gap:.5rem;
  width:100%;
  font-family:inherit;font-size:.7rem;font-weight:500;
  padding:.42rem .55rem;
  border:none;border-radius:6px;
  background:transparent;color:var(--text);
  cursor:pointer;text-align:left;
  transition:background .12s,color .12s;
}
.lang-opt:hover{background:var(--opt-hover)}
.lang-opt:focus-visible{outline:2px solid var(--ring);outline-offset:1px}
.lang-opt .o-flag{font-size:.86rem;line-height:1;width:18px;text-align:center;flex-shrink:0}
.lang-opt .o-name{flex:1}
.lang-opt .o-check{
  width:13px;height:13px;
  stroke:var(--accent);
  opacity:0;
  transition:opacity .15s;
  flex-shrink:0;
}
.lang-opt.selected .o-check{opacity:1}
.lang-opt.selected{background:var(--opt-sel-bg);font-weight:600}

/* ── Body ───────────────────────────────────── */
.body{padding:.9rem 1.05rem 1.1rem}

/* ── Top bar ────────────────────────────────── */
.top-bar{
  display:flex;align-items:center;flex-wrap:wrap;gap:.55rem;
  margin-bottom:.85rem;
}
.ai-grp{display:flex;align-items:center;gap:.45rem}
.ai-grp label{
  font-size:.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;
  color:var(--muted);white-space:nowrap;
  transition:color .2s;
}
.ai-grp input{
  width:118px;
  font-family:'JetBrains Mono',monospace;font-size:.83rem;
  padding:.36rem .52rem;
  border:1px solid var(--border);border-radius:7px;
  background:var(--input-bg);color:var(--text);outline:none;
  transition:border-color .15s,background-color .2s,box-shadow .15s;
}
.ai-grp input:hover{border-color:var(--accent-soft)}
.ai-grp input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--ring)}
input.invalid{border-color:var(--invalid-bd)!important;background:var(--invalid-bg)}

.btn-grp{display:flex;gap:.42rem;margin-left:auto}
.btn{
  font-family:inherit;font-size:.66rem;font-weight:600;
  padding:.4rem .66rem;
  border:1px solid var(--border);border-radius:7px;
  cursor:pointer;display:inline-flex;align-items:center;gap:.32rem;
  color:var(--accent);background:var(--btn-bg);white-space:nowrap;
  transition:background .15s,border-color .15s,color .15s,transform .12s,box-shadow .15s;
}
.btn:hover{background:var(--btn-hover);border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.btn:active{transform:translateY(0)}
.btn:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
.btn svg{width:13px;height:13px;flex-shrink:0;stroke:var(--accent);transition:stroke .15s}

/* ── Craft cost toggle ─────────────────────── */
.craft-grp{
  display:inline-flex;align-items:center;gap:.4rem;
}
.craft-toggle{
  position:relative;
  display:inline-flex;align-items:center;
  width:34px;height:18px;
  border:1px solid var(--border);border-radius:10px;
  background:var(--btn-bg);cursor:pointer;
  flex-shrink:0;
  transition:background .15s,border-color .15s;
}
.craft-toggle:hover{border-color:var(--accent)}
.craft-toggle:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
.craft-toggle .knob{
  position:absolute;
  top:1px;left:1px;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--muted);
  transition:transform .2s ease,background-color .2s;
}
.craft-toggle.on{background:var(--accent);border-color:var(--accent)}
.craft-toggle.on .knob{transform:translateX(16px);background:var(--rec-fg)}
.craft-label{
  font-size:.66rem;font-weight:600;
  color:var(--muted);white-space:nowrap;
  cursor:pointer;
  transition:color .15s;
}
.craft-grp:hover .craft-label{color:var(--accent)}

/* ── Cluster grid ───────────────────────────── */
.grid{display:grid;grid-template-columns:1fr;gap:.6rem}
@media(min-width:600px){.grid{grid-template-columns:1fr 1fr}}

/* ── Cluster card ───────────────────────────── */
.ccard{
  border:1px solid var(--border);border-radius:10px;
  overflow:hidden;background:var(--card-bg);
  box-shadow:var(--shadow-sm);
  transition:background-color .2s,border-color .2s,box-shadow .2s;
}
.ccard:hover{box-shadow:var(--shadow-md)}
.chead{
  display:flex;align-items:center;justify-content:space-between;
  padding:.5rem .75rem;
  background:var(--acc-bg);
  cursor:pointer;user-select:none;
  border-bottom:1px solid transparent;
  transition:background .15s,border-color .2s;
}
.chead:hover{background:var(--acc-hover)}
.ccard.open .chead{border-bottom-color:var(--border)}
.cname{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--accent);transition:color .2s}
.carrow{width:14px;height:14px;transition:transform .25s ease,stroke .2s;flex-shrink:0;stroke:var(--accent)}
.ccard.open .carrow{transform:rotate(180deg)}
.cbody-wrap{max-height:0;overflow:hidden;transition:max-height .3s ease}
.ccard.open .cbody-wrap{max-height:680px}
.cbody{padding:.6rem .75rem .72rem}

/* ── Input grid ─────────────────────────────── */
.igrid{
  display:grid;grid-template-columns:auto 1fr;
  gap:.34rem .5rem;align-items:center;
  margin-bottom:.42rem;
}
.igrid label{
  font-size:.64rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.03em;
  color:var(--muted);white-space:nowrap;
  transition:color .2s;
}
.igrid input{
  font-family:'JetBrains Mono',monospace;font-size:.76rem;
  padding:.3rem .42rem;
  border:1px solid var(--border);border-radius:6px;
  background:var(--input-bg);color:var(--text);
  outline:none;width:100%;transition:border-color .15s,background-color .2s,box-shadow .15s;
}
.igrid input:hover{border-color:var(--accent-soft)}
.igrid input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--ring)}

/* ── Stock row ──────────────────────────────── */
.srow{
  display:flex;align-items:center;gap:.45rem;
  margin-bottom:.42rem;flex-wrap:wrap;
}
.srow label{
  font-size:.64rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.03em;color:var(--muted);transition:color .2s;
}
.srow input{
  width:68px;
  font-family:'JetBrains Mono',monospace;font-size:.74rem;
  padding:.28rem .38rem;
  border:1px solid var(--border);border-radius:6px;
  background:var(--input-bg);color:var(--text);
  outline:none;transition:border-color .15s,background-color .2s,box-shadow .15s;
}
.srow input:hover{border-color:var(--accent-soft)}
.srow input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--ring)}
.stk-sum{font-size:.61rem;color:var(--muted);margin-left:auto;transition:color .2s}

/* ── Result cards ───────────────────────────── */
.rrow{display:grid;grid-template-columns:1fr 1fr;gap:.34rem;margin-bottom:.34rem}
.rcard{
  border:1px solid var(--border-soft);border-radius:8px;
  padding:.42rem .5rem;text-align:center;
  transition:background-color .2s,border-color .2s;
}
.rcard.amadon{background:var(--amadon-card);border-left:3px solid #c4a882}
.rcard.market{background:var(--market-card);border-left:3px solid #a0845c}
[data-theme="dark"] .rcard.amadon{border-left-color:#8a6c4a}
[data-theme="dark"] .rcard.market{border-left-color:#6e5638}
.rlbl{font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:.1rem;transition:color .2s}
.rval{font-family:'JetBrains Mono',monospace;font-size:.92rem;font-weight:700;color:var(--accent);transition:color .2s}
.rsub{font-size:.54rem;color:var(--muted);margin-top:.06rem;transition:color .2s}

/* ── BEP bar ────────────────────────────────── */
.bep-bar{
  background:var(--bep-bg);
  border:1px dashed var(--border);border-radius:7px;
  padding:.32rem .5rem;margin-bottom:.34rem;
  display:flex;align-items:baseline;justify-content:space-between;
  gap:.45rem;flex-wrap:wrap;
  transition:background-color .2s,border-color .2s;
}
.bep-main{font-size:.62rem;font-weight:700;color:var(--muted);white-space:nowrap;transition:color .2s}
.bep-main .bval{font-family:'JetBrains Mono',monospace;color:var(--accent);transition:color .2s}
.bep-hint{font-size:.56rem;color:var(--muted);opacity:.75;transition:color .2s}

/* ── Recommendation ─────────────────────────── */
.rec{
  border-radius:8px;padding:.46rem .6rem;
  display:flex;align-items:center;gap:.45rem;
  transition:background-color .3s ease;
}
.rec.r-market{background:var(--rec-mk-bg)}
.rec.r-amadon{background:var(--rec-am-bg)}
.rec.r-tie,
.rec.r-fall{background:var(--rec-tie-bg)}
.rec-icon{flex-shrink:0}
.rec-icon svg{width:18px;height:18px;display:block}
.rec-text{line-height:1.32;min-width:0}
.rec-hdg{font-size:.5rem;text-transform:uppercase;letter-spacing:.05em;color:var(--rec-fg);opacity:.72}
.rec-act{font-size:.78rem;font-weight:700;color:var(--rec-fg)}
.rec-rsn{font-size:.58rem;color:var(--rec-fg);opacity:.88}

/* ── Share bar ──────────────────────────────── */
.share-bar{
  display:flex;align-items:center;gap:.42rem;
  margin-top:.85rem;
}
.share-input{
  flex:1;min-width:0;
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  padding:.34rem .48rem;
  border:1px solid var(--border);border-radius:7px;
  background:var(--input-bg);color:var(--muted);
  outline:none;cursor:text;
  transition:border-color .15s,background-color .2s,color .15s;
}
.share-input:hover{border-color:var(--accent-soft)}
.share-input:focus{border-color:var(--accent);color:var(--text)}

/* ── Toast ──────────────────────────────────── */
.toast{
  position:fixed;bottom:1.6rem;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--accent);color:var(--toast-fg);
  padding:.48rem 1rem;border-radius:8px;
  font-size:.7rem;font-weight:600;
  z-index:99;opacity:0;
  transition:opacity .2s,transform .2s,background-color .3s,color .3s;
  pointer-events:none;white-space:nowrap;
  box-shadow:var(--shadow-md);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Reduced motion ─────────────────────────── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{transition:none!important;animation:none!important}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-l">
      <div class="logo-badge">
        <svg class="hdr-logo" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="3" y1="6" x2="21" y2="6" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 10a4 4 0 01-8 0" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="hdr-t">
        <div class="hdr-title" id="hTitle">Amadon P2P Calc</div>
        <div class="hdr-sub"  id="hSub">Sell to Amadon or players?</div>
      </div>
    </div>
    <div class="hdr-r">
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
        <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
        <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
      <div class="lang-dd" id="langDd">
        <button class="lang-btn" id="langBtn" type="button" aria-haspopup="listbox" aria-expanded="false" aria-label="Choose language">
          <span class="lang-flag" id="langFlag">🇬🇧</span>
          <span class="lang-code" id="langCode">EN</span>
          <svg class="lang-caret" viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="lang-menu" id="langMenu" role="listbox">
          <button class="lang-opt" data-lang="id"     role="option" type="button"><span class="o-flag">🇮🇩</span><span class="o-name">Bahasa Indonesia</span><svg class="o-check" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
          <button class="lang-opt" data-lang="en"     role="option" type="button"><span class="o-flag">🇬🇧</span><span class="o-name">English</span><svg class="o-check" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>

let lang = 'en';
function s(k,...a){
  const d=STR[lang]||STR.en;
  let v=d[k]!==undefined?d[k]:(STR.en[k]||k);
  a.forEach((x,i)=>v=v.replace(`{${i}}`,x));
  return v;
}

// ── Format ───────────────────────────────────
function fmt(n){
  if(!isFinite(n)||isNaN(n))return'∞';
  return Math.round(n).toLocaleString('en-US');
}

// ── Toast ────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),1900);
}

// ── Validation helper ────────────────────────
function getVal(el,decimal=true){
  const v=decimal?parseFloat(el.value):parseInt(el.value,10);
  const ok=isFinite(v)&&!isNaN(v)&&v>0;
  el.classList.toggle('invalid',!ok);
  return ok?v:null;
}

// ── URL params ───────────────────────────────
function buildQS(){
  const p=new URLSearchParams();
  const ai=document.getElementById('gAi').value;
  if(ai)p.set('ai',ai);
  CL.forEach(c=>{
    const a=document.getElementById(`a_${c.id}`).value;
    const r=document.getElementById(`r_${c.id}`).value;
    if(a)p.set(`${c.id}a`,a);
    if(r)p.set(`${c.id}r`,r);
    if(c.hasStock){
      const st=document.getElementById(`s_${c.id}`).value;
      if(st)p.set(`${c.id}s`,st);
    }
  });
  if(lang!=='id')p.set('l',lang);
  if(!useCost)p.set('cost','0');
  return p;
}

function syncURL(){
  const p=buildQS();
  try{history.replaceState(null,'',`?${p.toString()}`)}catch(_){}
  const base=location.href.split('?')[0];
  const url=`${base}?${p.toString()}`;
  const el=document.getElementById('shareUrl');
  if(el)el.value=url;
}

function loadQS(){
  const p=new URLSearchParams(location.search);
  if(p.has('ai'))document.getElementById('gAi').value=p.get('ai');
  CL.forEach(c=>{
    if(p.has(`${c.id}a`))document.getElementById(`a_${c.id}`).value=p.get(`${c.id}a`);
    if(p.has(`${c.id}r`))document.getElementById(`r_${c.id}`).value=p.get(`${c.id}r`);
    if(c.hasStock&&p.has(`${c.id}s`))document.getElementById(`s_${c.id}`).value=p.get(`${c.id}s`);
  });
  // cost toggle (URL 'cost=0' = off; otherwise on)
  if(p.has('cost')){
    applyUseCost(p.get('cost')!=='0');
  }
}

// ── Calc ─────────────────────────────────────
const ICON_MARKET='<svg viewBox="0 0 24 24" fill="none" stroke="#fdf8f0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>';
const ICON_AMADON='<svg viewBox="0 0 24 24" fill="none" stroke="#fdf8f0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';
const ICON_FALL='<svg viewBox="0 0 24 24" fill="none" stroke="rgba(253,248,240,.55)" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>';

// Global toggle: whether to apply per-cluster crafting cost
let useCost = false;
const COST_KEY='amadon-use-cost';
function applyUseCost(on){
  useCost = on;
  try{localStorage.setItem(COST_KEY, on?'1':'0')}catch(_){}
  const btn=document.getElementById('craftToggle');
  if(btn){
    btn.classList.toggle('on',on);
    btn.setAttribute('aria-checked',String(on));
    btn.setAttribute('aria-label',s('craft'));
  }
}

function calcOne(id){
  const cdef = CL.find(c=>c.id===id);
  const baseCost = cdef ? cdef.cost : COST;
  const cost = useCost ? baseCost : 0;
  const ai    = getVal(document.getElementById('gAi'));
  const amadon= getVal(document.getElementById(`a_${id}`));
  const rate  = getVal(document.getElementById(`r_${id}`));
  const stockEl = document.getElementById(`s_${id}`);
  const stock = stockEl ? getVal(stockEl,false) : null;

  const amNet = amadon!==null ? amadon-cost : null;
  const mkNet = (rate!==null&&ai!==null) ? (rate*ai)-cost : null;
  const bep   = (rate!==null&&amadon!==null&&rate>0) ? amadon/rate : null;

  document.getElementById(`nAm_${id}`).textContent = amNet!==null?fmt(amNet):'—';
  document.getElementById(`nMk_${id}`).textContent = mkNet!==null?fmt(mkNet):'—';
  document.getElementById(`bv_${id}` ).textContent = bep !==null?fmt(bep) :'—';

  if(stockEl){
    if(amNet!==null&&mkNet!==null&&stock!==null){
      stockEl.parentElement.querySelector(`#sum_${id}`).textContent=s('stk',fmt(amNet*stock),fmt(mkNet*stock));
    } else {
      stockEl.parentElement.querySelector(`#sum_${id}`).textContent='';
    }
  }

  const recEl=document.getElementById(`rec_${id}`);
  recEl.classList.remove('r-market','r-amadon','r-tie','r-fall');

  let type,ico,act,rsn;
  if(amNet===null||mkNet===null){
    type='r-fall';ico=ICON_FALL;act='—';rsn='';
  } else {
    const diff=Math.abs(mkNet-amNet);
    if(mkNet>amNet){
      type='r-market';act=s('aMk');rsn=s('rMk',fmt(diff));ico=ICON_MARKET;
    } else if(amNet>mkNet){
      type='r-amadon';act=s('aAm');rsn=s('rAm',fmt(diff));ico=ICON_AMADON;
    } else {
      type='r-tie';act=s('aTie');rsn=s('rTie');ico=ICON_FALL;
    }
  }
  recEl.classList.add(type);
  document.getElementById(`rIco_${id}`).innerHTML=ico;
  document.getElementById(`rAct_${id}`).textContent=act;
  document.getElementById(`rRsn_${id}`).textContent=rsn;
}

function calcAll(){
  CL.forEach(c=>calcOne(c.id));
  syncURL();
}

// ── Render clusters ───────────────────────────
const cardOpen={}; // first render defaults to open; subsequent renders preserve state
function renderClusters(){
  const saved={};
  CL.forEach(c=>{
    const ae=document.getElementById(`a_${c.id}`);
    const ce=document.getElementById(`cc_${c.id}`);
    if(ae){
      const se=document.getElementById(`s_${c.id}`);
      saved[c.id]={
        a:ae.value,
        r:document.getElementById(`r_${c.id}`).value,
        s: se?se.value:'',
        // preserve accordion state; default open on first render
        open: ce?ce.classList.contains('open'):(cardOpen[c.id]!==undefined?cardOpen[c.id]:true)
      };
      cardOpen[c.id]=saved[c.id].open;
    }
  });

  const grid=document.getElementById('grid');
  grid.innerHTML='';

  CL.forEach(c=>{
    const v=saved[c.id]||{a:c.dA,r:c.dR,s:c.dS,open:cardOpen[c.id]!==undefined?cardOpen[c.id]:true};
    cardOpen[c.id]=v.open;
    const el=document.createElement('div');
    el.className='ccard'+(v.open?' open':'');
    el.id=`cc_${c.id}`;
    const maxAttr = c.maxA!=null ? ` max="${c.maxA}"` : '';
    const stockRow = c.hasStock ? `
          <div class="srow">
            <label>${s('qty')}</label>
            <input type="number" id="s_${c.id}" value="${v.s}" min="1" step="1">
            <span class="stk-sum" id="sum_${c.id}"></span>
          </div>` : '';
    el.innerHTML=`
      <div class="chead" onclick="toggleCard('${c.id}')">
        <span class="cname">⬤ ${c.label}</span>
        <svg class="carrow" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="cbody-wrap">
        <div class="cbody">
          <div class="igrid">
            <label>${s('amadon')}</label>
            <input type="number" id="a_${c.id}" value="${v.a}" min="1" step="1"${maxAttr}>
            <label>${s('rate')} (Ai/${c.label})</label>
            <input type="number" id="r_${c.id}" value="${v.r}" min="0.01" step="0.1">
          </div>${stockRow}
          <div class="rrow">
            <div class="rcard amadon">
              <div class="rlbl">${s('lAm')}</div>
              <div class="rval" id="nAm_${c.id}">—</div>
              <div class="rsub">${s('net')}</div>
            </div>
            <div class="rcard market">
              <div class="rlbl">${s('lMk')}</div>
              <div class="rval" id="nMk_${c.id}">—</div>
              <div class="rsub">${s('net')}</div>
            </div>
          </div>
          <div class="bep-bar">
            <span class="bep-main">${s('bep')} = <span class="bval" id="bv_${c.id}">—</span> BTC</span>
            <span class="bep-hint" id="bH_${c.id}">${s('bepH')}</span>
          </div>
          <div class="rec" id="rec_${c.id}">
            <div class="rec-icon" id="rIco_${c.id}"></div>
            <div class="rec-text">
              <div class="rec-hdg" id="rHdg_${c.id}">${s('rec')}</div>
              <div class="rec-act" id="rAct_${c.id}"></div>
              <div class="rec-rsn" id="rRsn_${c.id}"></div>
            </div>
          </div>
        </div>
      </div>
    `;
    grid.appendChild(el);

    ['a','r'].forEach(f=>{
      document.getElementById(`${f}_${c.id}`).addEventListener('input',calcAll);
    });
    if(c.hasStock){
      document.getElementById(`s_${c.id}`).addEventListener('input',calcAll);
    }
  });
}

function toggleCard(id){
  const el=document.getElementById(`cc_${id}`);
  const isOpen=el.classList.toggle('open');
  cardOpen[id]=isOpen;
}

  const ct=document.getElementById('craftToggle');

// ── Copy utils ───────────────────────────────
function doCopy(text,ok){
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(()=>toast(ok)).catch(()=>fbCopy(text,ok));
  } else {
    fbCopy(text,ok);
  }
}
function fbCopy(text,ok){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:-9999px';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');toast(ok)}
  catch{toast(s('tFail'))}
  document.body.removeChild(ta);
}

function copyRec(){
  const out=[];
  const aiVal = parseFloat(document.getElementById('gAi').value) || 0;
  const LINE = '─'.repeat(38);

  // Header
  out.push(LINE);
  out.push(`${s('title')} — ${s('rec')}`);
  out.push(`${s('ai')}: ${fmt(aiVal)} BTC`);
  out.push(LINE);
  out.push('');

  let totalPotential = 0;
  let hasValid = false;

  const parseNum = t => {
    const n = parseInt((t||'').replace(/[^\d-]/g,''),10);
    return isNaN(n) ? 0 : n;
  };

  CL.forEach(c=>{
    const act = (document.getElementById(`rAct_${c.id}`).textContent||'').trim();
    const rsn = (document.getElementById(`rRsn_${c.id}`).textContent||'').trim();
    const amTxt = (document.getElementById(`nAm_${c.id}`).textContent||'').trim();
    const mkTxt = (document.getElementById(`nMk_${c.id}`).textContent||'').trim();
    const bepTxt = (document.getElementById(`bv_${c.id}`).textContent||'').trim();

    const amN = parseNum(amTxt);
    const mkN = parseNum(mkTxt);

    out.push(`▸ ${c.label}`);
    out.push(`  ${s('rec')}: ${act}`);

    if(act === '—' || act === ''){
      out.push(`  ${s('cpIncomplete')}`);
    } else if(rsn === s('rTie')){
      // Tie
      out.push(`  ${s('rTie')} · ${s('bep')} ${bepTxt} BTC`);
      if(c.hasStock){
        const stock = parseInt(document.getElementById(`s_${c.id}`).value,10) || 0;
        const total = amN * stock;
        out.push(`  ${s('qty')}: ${stock} · ${s('cpTotal')}: ${fmt(total)} BTC`);
        totalPotential += total;
      } else {
        totalPotential += amN;
      }
      hasValid = true;
    } else {
      // Market or Amadon wins
      out.push(`  ${s('lAm')}: ${amTxt} BTC`);
      out.push(`  ${s('lMk')}: ${mkTxt} BTC`);
      const diff = Math.abs(mkN - amN);
      const cmp = mkN > amN ? '>' : '<';
      out.push(`  ${s('cpDiff')}: +${fmt(diff)} BTC · Ai ${cmp} BEP (${bepTxt} BTC)`);
      if(c.hasStock){
        const stock = parseInt(document.getElementById(`s_${c.id}`).value,10) || 0;
        const best = (act === s('aMk')) ? mkN : amN;
        const total = best * stock;
        out.push(`  ${s('qty')}: ${stock} · ${s('cpTotal')}: ${fmt(total)} BTC`);
        totalPotential += total;
      } else {
        totalPotential += (act === s('aMk')) ? mkN : amN;
      }
      hasValid = true;
    }
    out.push('');
  });

  // Grand total
  if(hasValid){
    out.push(LINE);
    out.push(`${s('cpTotal')}: ${fmt(totalPotential)} BTC`);
    out.push(LINE);
  }

  doCopy(out.join('\n'), s('tCopy'));
}

function copyUrl(){
  doCopy(document.getElementById('shareUrl').value,s('tShare'));
}

function doReset(){
  document.getElementById('gAi').value=9000;
  document.getElementById('gAi').classList.remove('invalid');
  CL.forEach(c=>{
    document.getElementById(`a_${c.id}`).value=c.dA;
    document.getElementById(`r_${c.id}`).value=c.dR;
    const sEl=document.getElementById(`s_${c.id}`);
    if(sEl)sEl.value=c.dS;
    ['a','r','s'].forEach(f=>{
      const el=document.getElementById(`${f}_${c.id}`);
      if(el)el.classList.remove('invalid');
    });
  });
  calcAll();
  toast(s('tReset'));
}

// ── Theme ────────────────────────────────────
const THEME_KEY='amadon-theme';
function getInitialTheme(){
  const saved=localStorage.getItem(THEME_KEY);
  if(saved==='light'||saved==='dark')return saved;
  return window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem(THEME_KEY,t);
  const btn=document.getElementById('themeToggle');
  if(btn)btn.setAttribute('aria-label',t==='dark'?'Switch to light theme':'Switch to dark theme');
}

// ── Language dropdown ────────────────────────
function setLangUI(code){
  const def=LANGS.find(l=>l.code===code)||LANGS[0];
  document.getElementById('langFlag').textContent=def.flag;
  document.getElementById('langCode').textContent=def.short;
  document.querySelectorAll('.lang-opt').forEach(o=>{
    o.classList.toggle('selected',o.dataset.lang===code);
  });
}

function openLangMenu(){
  document.getElementById('langDd').classList.add('open');
  document.getElementById('langBtn').setAttribute('aria-expanded','true');
}
function closeLangMenu(){
  document.getElementById('langDd').classList.remove('open');
  document.getElementById('langBtn').setAttribute('aria-expanded','false');
}

function changeLang(code){
  if(!STR[code])return;
  lang=code;
  setLangUI(code);
  renderClusters();
  updateStatic();
  calcAll();
}

// ── Init ──────────────────────────────────────
applyTheme(getInitialTheme());
// Pre-parse URL for language BEFORE first render so labels match URL
{
  const p=new URLSearchParams(location.search);
  if(p.has('l')&&STR[p.get('l')])lang=p.get('l');
}
// Restore craft-cost toggle from localStorage first (loadQS may override via URL)
{
  const saved=localStorage.getItem(COST_KEY);
  if(saved==='0'||saved==='1')useCost = saved!=='0';
}
setLangUI(lang);
applyUseCost(useCost);   // sync toggle visual + aria
renderClusters();      // cluster inputs now exist in DOM
loadQS();              // safe to populate inputs from URL (may override useCost)
updateStatic();
calcAll();

document.getElementById('themeToggle').addEventListener('click',()=>{
  const cur=document.documentElement.getAttribute('data-theme');
  applyTheme(cur==='dark'?'light':'dark');
});

document.getElementById('craftToggle').addEventListener('click',()=>{
  applyUseCost(!useCost);
  calcAll();
});

document.getElementById('langBtn').addEventListener('click',e=>{
  e.stopPropagation();
  const dd=document.getElementById('langDd');
  dd.classList.contains('open')?closeLangMenu():openLangMenu();
});
document.querySelectorAll('.lang-opt').forEach(o=>{
  o.addEventListener('click',()=>{
    changeLang(o.dataset.lang);
    closeLangMenu();
  });
});
document.addEventListener('click',e=>{
  if(!e.target.closest('#langDd'))closeLangMenu();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeLangMenu();
});

document.getElementById('gAi').addEventListener('input',calcAll);
</script>
